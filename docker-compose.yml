services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prometheus
      POSTGRES_PASSWORD: prometheus
      POSTGRES_DB: prometheus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prometheus -d prometheus']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
